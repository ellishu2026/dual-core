name: Daily Signal Update

on:
  schedule:
    # 22:30 UTC, Mon-Fri = 6:30pm ET (EDT) / 5:30pm ET (EST)
    # US market closes 4:00pm ET year-round, so this always lands
    # 1.5-2.5h after close depending on daylight saving.
    - cron: '30 22 * * 1-5'
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data engine
        run: python fetch_data.py

      - name: Commit updated signals
        run: |
          git config user.name "dual-core-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/signals.json
          git diff --staged --quiet || git commit -m "chore: refresh signals $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
