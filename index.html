<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Core · NVDA / LLY / SOXL EMA Signals</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dual Core">
<meta name="theme-color" content="#FAFAF7">
<style>
  :root{
    --paper:#FAFAF7;
    --card:#FFFFFF;
    --ink:#1B1D1F;
    --muted:#767A80;
    --line:#E7E5DF;
    --nvda:#2F7D4F;
    --nvda-soft:#E6F2EA;
    --lly:#B4322B;
    --lly-soft:#F7E9E7;
    --soxl:#3A5FA0;
    --soxl-soft:#E8ECF6;
    --watch:#B8862B;
    --watch-soft:#FBF1DE;
    --stop:#B4322B;
    --stop-soft:#F7E9E7;
    --hold:#2F7D4F;
    --hold-soft:#E6F2EA;
    --pill-bg:#F1F0EB;
    --mono: "SF Mono","IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:26px 18px 60px;}

  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{width:36px;height:36px;display:block;}
  .brand h1{font-size:20px;margin:0;letter-spacing:0.2px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .ver{display:inline-block;padding:2px 8px;border:1px solid var(--line);border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);}
  .meta{font-size:11.5px;color:var(--muted);text-align:right;padding-top:4px;}

  /* rule pills */
  .pills{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
  .pill{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 14px;
    font-size:12px;
    line-height:1.4;
    display:flex;
    align-items:center;
    gap:7px;
    flex:0 1 auto;
  }
  .pill .tag{
    font-size:10px;font-weight:800;letter-spacing:0.5px;
    text-transform:uppercase;color:#fff;background:var(--ink);
    padding:2px 7px;border-radius:999px;flex-shrink:0;
  }
  .pill.entry .tag{background:var(--hold);}
  .pill.stop .tag{background:var(--stop);}
  .pill.tp .tag{background:var(--watch);}
  .pill.params .tag{background:#5B5F66;}
  .pill span.txt{color:var(--ink);}
  .pill code{font-family:var(--mono);font-size:11.5px;background:var(--pill-bg);padding:1px 5px;border-radius:4px;}

  /* ticker cards - full width, stacked */
  .stack{display:flex;flex-direction:column;gap:18px;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 22px 22px;
  }
  .card.nvda{border-top:3px solid var(--nvda);}
  .card.lly{border-top:3px solid var(--lly);}
  .card.soxl{border-top:3px solid var(--soxl);}

  .card-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .card-top-left{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .mini-stat{font-family:var(--mono);font-size:12px;font-weight:600;}
  .mini-stat.stop{color:var(--stop);}
  .mini-stat.tp{color:var(--watch);}
  .ticker{font-size:22px;font-weight:800;letter-spacing:0.3px;}
  .ticker.nvda{color:var(--nvda);}
  .ticker.lly{color:var(--lly);}
  .ticker.soxl{color:var(--soxl);}
  .price{font-family:var(--mono);font-size:20px;font-weight:600;}
  .date{font-size:11px;color:var(--muted);}

  .badge{
    display:inline-block;
    font-size:12.5px;
    font-weight:700;
    padding:5px 12px;
    border-radius:20px;
  }
  .badge.watch{background:var(--watch-soft);color:var(--watch);}
  .badge.hold{background:var(--hold-soft);color:var(--hold);}
  .badge.stop{background:var(--stop-soft);color:var(--stop);}

  /* timeframe toggle */
  .tf-toggle{display:flex;gap:4px;background:var(--pill-bg);border-radius:8px;padding:3px;}
  .tf-btn{
    border:none;background:transparent;font-family:var(--sans);
    font-size:11.5px;font-weight:700;letter-spacing:0.3px;
    padding:5px 12px;border-radius:6px;cursor:pointer;color:var(--muted);
  }
  .tf-btn.active{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,0.08);}

  .body-row{display:flex;gap:22px;align-items:flex-start;}
  .chart-col{flex:1;min-width:0;}
  .log-col{width:155px;flex-shrink:0;}

  .readout{
    font-family:var(--mono);font-size:8.5px;color:var(--muted);
    background:var(--pill-bg);border-radius:8px;padding:6px 8px;
    margin-bottom:8px;
    display:flex;align-items:center;gap:4px;
    white-space:nowrap;overflow-x:auto;
  }
  .readout b{color:var(--ink);flex-shrink:0;}
  .readout .ritem{flex-shrink:0;}

  @media (max-width:900px){
    .readout{font-size:7.5px;gap:3px;}
  }

  .chart-wrap{margin:0 0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .chart-wrap svg{width:100%;height:auto;display:block;cursor:crosshair;}
  @media (max-width:520px){
    .chart-wrap svg{width:600px;max-width:none;}
  }
  .axis-label{font-family:var(--mono);font-size:9.5px;fill:var(--muted);}
  .gridline{stroke:var(--line);stroke-width:1;}

  .legend{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 4px;font-size:10.5px;color:var(--muted);font-family:var(--mono);}
  .legend .item{display:flex;align-items:center;gap:4px;}
  .legend .swatch{width:12px;height:2px;display:inline-block;border-radius:1px;}
  .legend .swatch.price{height:3px;}


  .log-col .log{border-top:none;padding-top:0;}
  .log h4{font-size:9px;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);margin:0 0 6px;font-weight:700;}
  .log ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px;max-height:270px;overflow-y:auto;}
  .log li{display:flex;flex-direction:column;gap:1px;font-size:10px;border-bottom:1px dashed var(--line);padding-bottom:5px;}
  .log .a{color:var(--ink);font-weight:600;}
  .log .d{color:var(--muted);font-family:var(--mono);font-size:9px;}
  .empty{color:var(--muted);font-size:10.5px;}

  footer{margin-top:26px;font-size:11px;color:var(--muted);text-align:center;}
  .loading{color:var(--muted);font-size:13px;padding:40px 0;text-align:center;}

  @media (max-width:760px){
    .body-row{flex-direction:column;}
    .log-col{width:100%;}
    .log-col .log{border-top:1px solid var(--line);padding-top:12px;}
  }
  @media (max-width:640px){
    .pills{grid-template-columns:1fr;}
  }
  @media (max-width:520px){
    .price{font-size:17px;}
    .ticker{font-size:19px;}
    .pill{font-size:11px;padding:7px 11px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <img src="logo.svg" alt="Dual Core">
      <h1>Dual Core <span class="ver" id="verPill">v—</span></h1>
    </div>
    <div class="meta" id="meta">Loading…</div>
  </header>

  <div class="pills">
    <div class="pill entry"><span class="tag">Entry</span><span class="txt">≤<code>EMA180</code> Watch → ≤<code>EMA195</code> Enter <code>30%</code> → ≤<code>EMA225</code> Add <code>75%</code></span></div>
    <div class="pill stop"><span class="tag">Stop Loss</span><span class="txt">≤<code>0.9×EMA225</code> Exit</span></div>
    <div class="pill tp"><span class="tag">Take Profit</span><span class="txt">Bullish stack + <code>1Y High(-21d)×1.09</code>, then &lt;<code>EMA5</code> Half, &lt;<code>EMA9</code> Exit</span></div>
    <div class="pill params"><span class="tag">Parameters</span><span class="txt">Entry <code>30%→75%</code> · Stop <code>0.9×</code> · TP <code>50%→0%</code></span></div>
  </div>

  <div class="stack" id="stack">
    <div class="loading">Loading signal data…</div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
// Fetch straight from GitHub's raw content, not jsDelivr. jsDelivr caches
// @branch references separately from file content, and a successful purge
// doesn't reliably clear that — it stayed stale for hours in testing.
// raw.githubusercontent.com is close to real-time and fine for normal
// (non-bursty) personal-dashboard traffic.
const DATA_URL = 'https://raw.githubusercontent.com/ellishu2026/dual-core/main/data/signals.json';
const EMA_ORDER = [5,9,20,60,120,180,195,225]; // short to long
// key EMAs the strategy actually acts on get distinct colors + a thicker
// stroke; 20/60/120 are context-only and stay thin, light gray
const EMA_STYLE = {
  5:   {color:'#E07A5F', width:2.2},   // fast — entry/TP trigger line
  9:   {color:'#E9A23B', width:2.2},   // fast — TP full-exit trigger line
  20:  {color:'#D8D6D0', width:1},
  60:  {color:'#C7C4BB', width:1},
  120: {color:'#B6B2A6', width:1},
  180: {color:'#4A7C82', width:2},     // watch threshold
  195: {color:'#3D5A80', width:2},     // 30% entry threshold
  225: {color:'#293241', width:2.4},   // 75% entry / stop-loss reference
};
const TICKER_CLASS = {NVDA:"nvda", LLY:"lly", SOXL:"soxl"};
const TICKER_COLOR = {NVDA:"#2F7D4F", LLY:"#B4322B", SOXL:"#3A5FA0"};

function fmt(n){ return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ const [y,m,day] = d.split('-'); return `${parseInt(m,10)}/${parseInt(day,10)}`; }

function emaColor(period){ return EMA_STYLE[period].color; }
function emaWidth(period){ return EMA_STYLE[period].width; }

function badgeInfo(t){
  if(t.status.includes('Stop-Loss')) return {cls:'stop', text:t.status};
  if(t.position_pct>0) return {cls:'hold', text:t.status};
  return {cls:'watch', text:t.status};
}

const CHART_W = 900, CHART_H = 260, PAD_L = 44, PAD_R = 12, PAD_T = 14, PAD_B = 22;

function computeScale(chart){
  const n = chart.dates.length;
  const allVals = chart.close.slice();
  EMA_ORDER.forEach(p => allVals.push(...chart.ema[String(p)]));
  const max = Math.max(...allVals) * 1.02;
  const min = Math.min(...allVals) * 0.98;
  const span = (max - min) || 1;
  const xOf = i => PAD_L + (n===1 ? 0 : (i/(n-1)) * (CHART_W-PAD_L-PAD_R));
  const yOf = v => PAD_T + (1 - (v-min)/span) * (CHART_H-PAD_T-PAD_B);
  return {n, max, min, span, xOf, yOf};
}

// module-level: which chart data + color is currently shown per ticker,
// so the hover handler (wired once, called on every mousemove) knows what
// to read without re-fetching or re-parsing the SVG
const chartState = {};

function buildChartSVG(chart, priceColor, ticker){
  const n = chart.dates.length;
  if(n === 0) return '<svg viewBox="0 0 900 260"></svg>';
  const {max, span, xOf, yOf} = computeScale(chart);

  const pathFor = arr => arr.map((v,i)=> `${i===0?'M':'L'}${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' ');

  let svg = `<svg viewBox="0 0 ${CHART_W} ${CHART_H}" xmlns="http://www.w3.org/2000/svg">`;

  // horizontal gridlines (4 bands)
  for(let i=0;i<=4;i++){
    const y = PAD_T + i*(CHART_H-PAD_T-PAD_B)/4;
    const val = max - i*(span/4);
    svg += `<line class="gridline" x1="${PAD_L}" y1="${y.toFixed(1)}" x2="${CHART_W-PAD_R}" y2="${y.toFixed(1)}"/>`;
    svg += `<text class="axis-label" x="4" y="${(y+3).toFixed(1)}">${fmt(val)}</text>`;
  }

  // x-axis date labels: 5 evenly spaced, formatted M/D
  const xIdx = n===1 ? [0] : [0,1,2,3,4].map(k => Math.round(k*(n-1)/4));
  [...new Set(xIdx)].forEach(i=>{
    svg += `<text class="axis-label" x="${xOf(i).toFixed(1)}" y="${CHART_H-6}" text-anchor="middle">${fmtDate(chart.dates[i])}</text>`;
  });

  // EMA lines (key lines colored/thick, context lines thin gray)
  EMA_ORDER.forEach(p=>{
    svg += `<path d="${pathFor(chart.ema[String(p)])}" fill="none" stroke="${emaColor(p)}" stroke-width="${emaWidth(p)}"/>`;
  });

  // price line on top, thick + colored
  svg += `<path d="${pathFor(chart.close)}" fill="none" stroke="${priceColor}" stroke-width="2.6" stroke-linejoin="round"/>`;

  // hover interaction: invisible capture area + guide line + dot, all
  // hidden until the mouse moves over the chart
  svg += `<line class="hover-guide" x1="0" x2="0" y1="${PAD_T}" y2="${CHART_H-PAD_B}" stroke="var(--ink)" stroke-width="1" stroke-dasharray="3,3" opacity="0"/>`;
  svg += `<circle class="hover-dot" r="4" fill="${priceColor}" stroke="#fff" stroke-width="1.5" opacity="0"/>`;
  svg += `<rect class="hover-rect" data-ticker="${ticker}" x="${PAD_L}" y="0" width="${CHART_W-PAD_L-PAD_R}" height="${CHART_H}" fill="transparent"/>`;

  svg += `</svg>`;
  return svg;
}

function buildLegend(priceColor){
  let html = `<div class="legend"><span class="item"><span class="swatch price" style="background:${priceColor}"></span>Close</span>`;
  EMA_ORDER.forEach(p=>{
    html += `<span class="item"><span class="swatch" style="background:${emaColor(p)}"></span>EMA${p}</span>`;
  });
  html += `</div>`;
  return html;
}

function renderLog(t){
  if(!t.last_events || t.last_events.length===0){
    return '<div class="log"><h4>Recent Actions (Past 1Y)</h4><div class="empty">No state changes in the past year</div></div>';
  }
  const items = t.last_events.slice().reverse().map(e=>
    `<li><span class="a">${e.action} (${e.position_pct}%)</span><span class="d">${e.date}</span></li>`
  ).join('');
  return `<div class="log"><h4>Recent Actions (Past 1Y)</h4><ul>${items}</ul></div>`;
}

function renderCard(ticker, t){
  const cls = TICKER_CLASS[ticker] || '';
  const color = TICKER_COLOR[ticker] || '#333';
  const b = badgeInfo(t);
  chartState[ticker] = {chart: t.chart.day, color};
  return `
  <div class="card ${cls}" data-ticker="${ticker}">
    <div class="card-top">
      <div class="card-top-left">
        <div class="ticker ${cls}">${ticker}</div>
        <div class="price">$${fmt(t.price)}</div>
        <span class="badge ${b.cls}">${b.text}</span>
        <span class="mini-stat stop">Stop: $${fmt(t.stop_level)}</span>
        <span class="mini-stat tp">Take-profit: $${fmt(t.tp_level)}</span>
      </div>
      <div class="tf-toggle" data-ticker="${ticker}">
        <button class="tf-btn active" data-tf="day">DAY</button>
        <button class="tf-btn" data-tf="week">WEEK</button>
        <button class="tf-btn" data-tf="month">MONTH</button>
      </div>
    </div>
    <div class="date">As of ${t.date} close</div>
    <div class="body-row">
      <div class="chart-col">
        <div class="readout" id="readout-${ticker}">${buildReadoutHTML(t.chart.day, t.chart.day.dates.length-1)}</div>
        <div class="chart-wrap" id="chart-${ticker}">${buildChartSVG(t.chart.day, color, ticker)}</div>
        ${buildLegend(color)}
      </div>
      <div class="log-col">${renderLog(t)}</div>
    </div>
  </div>`;
}

function fmtCompact(n){ return Number(n).toFixed(2); } // no thousands comma — saves width in the readout row

function buildReadoutHTML(chart, idx){
  if(!chart.dates.length) return '';
  const parts = [`<b class="ritem">${fmtDate(chart.dates[idx])}</b>`, `<span class="ritem">Close $${fmtCompact(chart.close[idx])}</span>`];
  EMA_ORDER.forEach(p=>{
    parts.push(`<span class="ritem">EMA${p} <span style="color:${emaColor(p)}">$${fmtCompact(chart.ema[String(p)][idx])}</span></span>`);
  });
  return parts.join('');
}

function wireChartHover(ticker){
  const container = document.getElementById(`chart-${ticker}`);
  const svg = container.querySelector('svg');
  const rect = svg.querySelector('.hover-rect');
  const guide = svg.querySelector('.hover-guide');
  const dot = svg.querySelector('.hover-dot');
  const readout = document.getElementById(`readout-${ticker}`);
  if(!rect) return;

  const showIndex = (idx) => {
    const {chart} = chartState[ticker];
    const {xOf, yOf} = computeScale(chart);
    const x = xOf(idx);
    guide.setAttribute('x1', x); guide.setAttribute('x2', x); guide.setAttribute('opacity', 1);
    dot.setAttribute('cx', x); dot.setAttribute('cy', yOf(chart.close[idx])); dot.setAttribute('opacity', 1);
    readout.innerHTML = buildReadoutHTML(chart, idx);
  };
  const resetToLatest = () => {
    const {chart} = chartState[ticker];
    guide.setAttribute('opacity', 0); dot.setAttribute('opacity', 0);
    readout.innerHTML = buildReadoutHTML(chart, chart.dates.length-1);
  };

  rect.addEventListener('mousemove', (evt)=>{
    const {chart} = chartState[ticker];
    const n = chart.dates.length;
    if(n===0) return;
    const svgRect = svg.getBoundingClientRect();
    const svgX = (evt.clientX - svgRect.left) * (CHART_W / svgRect.width);
    const step = (CHART_W-PAD_L-PAD_R) / Math.max(n-1,1);
    let idx = Math.round((svgX - PAD_L) / step);
    idx = Math.max(0, Math.min(n-1, idx));
    showIndex(idx);
  });
  rect.addEventListener('mouseleave', resetToLatest);
}

function wireToggles(data){
  document.querySelectorAll('.tf-toggle').forEach(toggle=>{
    const ticker = toggle.dataset.ticker;
    wireChartHover(ticker); // initial DAY view
    toggle.querySelectorAll('.tf-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        toggle.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const tf = btn.dataset.tf;
        const color = TICKER_COLOR[ticker] || '#333';
        const chart = data.tickers[ticker].chart[tf];
        chartState[ticker] = {chart, color};
        document.getElementById(`chart-${ticker}`).innerHTML = buildChartSVG(chart, color, ticker);
        document.getElementById(`readout-${ticker}`).innerHTML = buildReadoutHTML(chart, chart.dates.length-1);
        wireChartHover(ticker); // re-wire since innerHTML replaced the SVG
      });
    });
  });
}

fetch(DATA_URL + '?_=' + Date.now())
  .then(r=>{ if(!r.ok) throw new Error('signals.json not found'); return r.json(); })
  .then(data=>{
    document.getElementById('verPill').textContent = 'v' + data.version;
    document.getElementById('meta').textContent =
      `Source yfinance · Updated ${new Date(data.updated_at).toLocaleString('en-US')}`;
    const stack = document.getElementById('stack');
    stack.innerHTML = ['NVDA','LLY','SOXL'].map(tk => data.tickers[tk] ? renderCard(tk, data.tickers[tk]) : '').join('');
    wireToggles(data);
    document.getElementById('footer').textContent =
      'For personal research only — not investment advice. Auto-refreshes ~1hr after US market close.';
  })
  .catch(err=>{
    document.getElementById('stack').innerHTML =
      `<div class="loading">Failed to load data: ${err.message}<br>Check that data/signals.json exists.</div>`;
  });
</script>
</body>
</html>
